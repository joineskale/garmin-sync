name: Garmin Notion Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync Garmin data to Notion

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Garmin to Notion sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_TOKENS_JSON: ${{ secrets.GARMIN_TOKENS_JSON }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_WELLNESS_DB_ID: ${{ secrets.NOTION_WELLNESS_DB_ID }}
          NOTION_STRAVA_DB_ID: ${{ secrets.NOTION_STRAVA_DB_ID }}
        run: |
          python garmin_to_notion.py
